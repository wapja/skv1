name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  pint:
    name: lint (pint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none
      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
      - name: Configure Flux Pro auth
        env:
          FLUX_PRO_USERNAME: ${{ secrets.FLUX_PRO_USERNAME }}
          FLUX_PRO_PASSWORD: ${{ secrets.FLUX_PRO_PASSWORD }}
        run: |
          if [ -n "$FLUX_PRO_USERNAME" ]; then
            composer config --global http-basic.composer.fluxui.dev "$FLUX_PRO_USERNAME" "$FLUX_PRO_PASSWORD"
          fi
      - run: composer install --no-interaction --prefer-dist --no-progress --no-scripts
      - run: vendor/bin/pint --test

  pest-unit-feature:
    name: pest (unit + feature + arch)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: skv1_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_ENV: testing
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: skv1_test
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_pgsql, pgsql
          tools: composer:v2
          coverage: none
      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
      - name: Configure Flux Pro auth
        env:
          FLUX_PRO_USERNAME: ${{ secrets.FLUX_PRO_USERNAME }}
          FLUX_PRO_PASSWORD: ${{ secrets.FLUX_PRO_PASSWORD }}
        run: |
          if [ -n "$FLUX_PRO_USERNAME" ]; then
            composer config --global http-basic.composer.fluxui.dev "$FLUX_PRO_USERNAME" "$FLUX_PRO_PASSWORD"
          fi
      - run: composer install --no-interaction --prefer-dist --no-progress
      - run: cp .env.example .env && php artisan key:generate
      - run: php artisan migrate --force
      - run: vendor/bin/pest --testsuite=Unit,Feature,Arch --compact

  pest-browser:
    name: pest (browser)
    runs-on: ubuntu-latest
    needs: pest-unit-feature
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: skv1_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_ENV: testing
      APP_URL: http://127.0.0.1:8000
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: skv1_test
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_pgsql, pgsql
          tools: composer:v2
          coverage: none
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Configure Flux Pro auth
        env:
          FLUX_PRO_USERNAME: ${{ secrets.FLUX_PRO_USERNAME }}
          FLUX_PRO_PASSWORD: ${{ secrets.FLUX_PRO_PASSWORD }}
        run: |
          if [ -n "$FLUX_PRO_USERNAME" ]; then
            composer config --global http-basic.composer.fluxui.dev "$FLUX_PRO_USERNAME" "$FLUX_PRO_PASSWORD"
          fi
      - run: composer install --no-interaction --prefer-dist --no-progress
      - run: npm ci && npm run build
      - run: cp .env.example .env && php artisan key:generate
      - run: php artisan migrate --force
      - run: vendor/bin/pest --testsuite=Browser --compact
